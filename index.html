<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armónica Interactive Menu</title>
    <!-- Iconos y Fuentes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-concrete: #141414;     /* Cemento profundo */
            --surface-dark: #0a0a0a;    /* Negro absoluto */
            --border-grunge: #222222;   /* Bordes industriales */
            --neon-white: #ffffff;      /* Luz del logo circular */
            --skate-yellow: #ffcc00;    /* Amarillo fuego / neón urbano */
            --text-light: #f5f5f5;
            --text-dim: #777777;
            --whatsapp-green: #25d366;
            --font-urban: 'Anton', sans-serif;
            --font-clean: 'Space Grotesk', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-clean);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-concrete);
            color: var(--text-light);
            padding-bottom: 110px;
            overflow-x: hidden;
            /* Patrón triangular icónico del papel envoltorio del local */
            background-image: linear-gradient(30deg, #0f0f0f 25%, transparent 25%), 
                              linear-gradient(30deg, transparent 75%, #0f0f0f 75%), 
                              linear-gradient(30deg, #0f0f0f 25%, transparent 25%);
            background-size: 24px 24px;
            background-position: 0 0, 12px 6px, 12px 6px;
        }

        /* --- URBAN HEADER --- */
        .shop-header {
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(20,20,20,0.8) 100%);
            padding: 40px 20px 25px 20px;
            text-align: center;
            border-bottom: 2px solid var(--border-grunge);
            backdrop-filter: blur(10px);
        }
        
        /* Contenedor interactivo inspirado en el logo circular brillante de la barra */
        .logo-glow-container {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--neon-white);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3), inset 0 0 15px rgba(255,255,255,0.2);
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            animation: logoPulse 3s infinite alternate;
        }
        .logo-glow-container span {
            font-family: var(--font-urban);
            font-size: 44px;
            color: var(--neon-white);
            line-height: 1;
            margin-top: -5px;
        }

        @keyframes logoPulse {
            0% { box-shadow: 0 0 15px rgba(255, 255, 255, 0.2); }
            100% { box-shadow: 0 0 25px rgba(255, 255, 255, 0.5), 0 0 10px var(--skate-yellow); }
        }

        .shop-header h1 {
            font-family: var(--font-urban);
            font-size: 32px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            line-height: 0.95;
            color: var(--text-light);
        }
        .shop-header h1 span {
            color: var(--skate-yellow);
        }
        .status-badge {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #000;
            background-color: var(--skate-yellow);
            padding: 3px 10px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
        }

        /* --- CATEGORÍAS INTERACTIVAS (GLASSMORPHISM) --- */
        .categories-slider {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: rgba(10, 10, 10, 0.85);
            position: sticky;
            top: 0;
            z-index: 10;
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border-grunge);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
        .categories-slider::-webkit-scrollbar { display: none; }

        .category-pill {
            background: rgba(40, 40, 40, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-dim);
            padding: 10px 20px;
            font-family: var(--font-urban);
            font-size: 15px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .category-pill.active {
            background-color: var(--skate-yellow);
            color: #000;
            border-color: var(--skate-yellow);
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
        }

        /* --- INTERACTIVE MENU GRID --- */
        .menu-grid {
            padding: 20px 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
            gap: 14px;
        }

        .menu-card {
            background: rgba(15, 15, 15, 0.85);
            border: 1px solid var(--border-grunge);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInUp 0.4s forwards ease;
        }
        
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Efecto feedback al pasar el dedo o clickear */
        .menu-card:active {
            transform: scale(0.98);
            border-color: var(--skate-yellow);
        }

        .card-visual-area {
            width: 100%;
            height: 110px;
            background: linear-gradient(135deg, #111 0%, #222 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            border-bottom: 1px solid var(--border-grunge);
            position: relative;
            transition: all 0.3s ease;
        }
        
        .menu-card:hover .card-visual-area {
            background: linear-gradient(135deg, #181818 0%, #333 100%);
        }

        .card-body {
            padding: 14px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .card-body h3 {
            font-family: var(--font-urban);
            font-size: 17px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            color: var(--text-light);
            line-height: 1.1;
        }
        .card-desc {
            font-size: 11.5px;
            color: var(--text-dim);
            line-height: 1.4;
            margin-bottom: 14px;
            flex-grow: 1;
        }
        .card-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }
        .card-price {
            font-family: var(--font-urban);
            color: var(--skate-yellow);
            font-size: 20px;
            letter-spacing: 0.5px;
        }
        
        /* Botón de agregar interactivo */
        .btn-add-interactive {
            background-color: transparent;
            color: var(--text-light);
            border: 1px solid rgba(255,255,255,0.2);
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-add-interactive:active {
            background-color: var(--neon-white);
            color: #000;
            transform: rotate(90deg) scale(1.1);
        }

        /* --- FLOATING INTERACTIVE BAR --- */
        .bottom-order-bar {
            position: fixed;
            bottom: 25px; left: 15px; right: 15px;
            background-color: var(--neon-white);
            color: #000;
            padding: 16px 24px;
            border-radius: 0px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            z-index: 20;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(150%);
        }
        .bottom-order-bar.visible {
            transform: translateY(0);
        }
        /* Efecto de pulso neón cuando tiene items */
        .bottom-order-bar.has-items {
            animation: barGlow 2s infinite alternate;
        }
        @keyframes barGlow {
            0% { box-shadow: 0 15px 35px rgba(0,0,0,0.9); }
            100% { box-shadow: 0 0 20px rgba(255, 204, 0, 0.6), 0 15px 35px rgba(0,0,0,0.9); }
        }

        .bottom-order-bar span {
            font-family: var(--font-urban);
            font-size: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .counter-badge {
            background-color: #000;
            color: var(--skate-yellow);
            font-family: var(--font-urban);
            font-size: 14px;
            padding: 3px 10px;
            margin-left: 8px;
        }

        /* --- SLIDE-UP DRAWER COMANDA --- */
        .drawer-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 30;
            display: none;
            align-items: flex-end;
        }
        .drawer-surface {
            background-color: var(--surface-dark);
            width: 100%;
            max-height: 85vh;
            border-top: 3px solid var(--border-grunge);
            display: flex;
            flex-direction: column;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .drawer-overlay.active .drawer-surface {
            transform: translateY(0);
        }
        
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-grunge);
            padding-bottom: 12px;
        }
        .drawer-header h2 {
            font-family: var(--font-urban);
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 32px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .btn-close:hover { color: var(--text-light); }

        .drawer-items-list {
            overflow-y: auto;
            flex-grow: 1;
            margin-bottom: 20px;
        }
        .drawer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #141414;
        }
        .row-info h4 {
            font-family: var(--font-urban);
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .row-info span {
            font-size: 13px;
            color: var(--skate-yellow);
            font-weight: 500;
        }
        .row-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn-qty-interactive {
            background: #111;
            border: 1px solid var(--border-grunge);
            color: #fff;
            width: 30px;
            height: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-qty-interactive:active {
            background-color: var(--text-light);
            color: #000;
        }
        .qty-number {
            font-family: var(--font-urban);
            font-size: 16px;
            min-width: 15px;
            text-align: center;
        }

        .checkout-footer { margin-top: auto; }
        .total-display-row {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-urban);
            font-size: 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .total-display-row .val { color: var(--skate-yellow); font-size: 24px; }
        
        .btn-submit-comanda {
            width: 100%;
            background-color: var(--whatsapp-green);
            color: white;
            border: none;
            padding: 16px;
            font-family: var(--font-urban);
            font-size: 18px;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }
    </style>
</head>

            { id: 42, name: "Limonada con Hierba Buena", category: "bebidas", price: 3.50, desc: "Limonada con hierba buena fresca o infusión helada.", icon: "🌿" },
            { id: 43, name: "Café de la Barra (Caliente)", category: "bebidas", price: 2.50, desc: "Americano, Cappuccino, Latte o Vainilla.", icon: "☕" },
            { id: 44, name: "Café Especial / Chocolate", category: "bebidas", price: 3.00, desc: "Café con leche de almendra o Chocolate caliente.", icon: "☕" },
            { id: 45, name: "Moccachino", category: "bebidas", price: 3.50, desc: "Café espresso, leche y chocolate gourmet.", icon: "🍫" }
        ];

        let cart = [];

        // Inyección dinámica con animación escalonada por CSS
        function renderMenu(products) {
            const container = document.getElementById('menu-items-container');
            container.innerHTML = '';
            products.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.style.animationDelay = `${index * 0.03}s`; // Micro-retraso secuencial
                card.innerHTML = `
                    <div class="card-visual-area">${p.icon}</div>
                    <div class="card-body">
                        <h3>${p.name}</h3>
                        <p class="card-desc">${p.desc}</p>
                        <div class="card-controls">
                            <span class="card-price">$${p.price.toFixed(2)}</span>
                            <button class="btn-add-interactive" onclick="addToCart(${p.id})">+</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterCategory(cat) {
            document.querySelectorAll('.category-pill').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            // Animación suave de recarga del contenedor
            const container = document.getElementById('menu-items-container');
            container.style.opacity = 0;
            
            setTimeout(() => {
                if (cat === 'todos') {
                    renderMenu(menuProducts);
                } else {
                    renderMenu(menuProducts.filter(p => p.category === cat));
                }
                container.style.opacity = 1;
            }, 150);
        }

        function addToCart(id) {
            const product = menuProducts.find(p => p.id === id);
            const inCart = cart.find(item => item.id === id);
            if (inCart) { inCart.qty++; } else { cart.push({...product, qty: 1}); }
            updateUI();
        }

        function adjustQty(id, amount) {
            const item = cart.find(p => p.id === id);
            if (!item) return;
            item.qty += amount;
            if (item.qty <= 0) cart = cart.filter(p => p.id !== id);
            updateUI();
        }

        function updateUI() {
            const count = cart.reduce((acc, i) => acc + i.qty, 0);
            const orderBar = document.getElementById('order-bar');
            
            // Control inteligente de visibilidad de la barra inferior
            if (count > 0) {
                orderBar.classList.add('visible', 'has-items');
            } else {
                orderBar.classList.remove('visible', 'has-items');
                toggleDrawer(false);
            }
            
            document.getElementById('cart-badge').innerText = count;

            const body = document.getElementById('drawer-items');
            body.innerHTML = '';
            let total = 0;

            cart.forEach(i => {
                const sub = i.price * i.qty;
                total += sub;
                body.innerHTML += `
                    <div class="drawer-row">
                        <div class="row-info">
                            <h4>${i.name}</h4>
                            <span>$${sub.toFixed(2)} (${i.qty} x $${i.price.toFixed(2)})</span>
                        </div>
                        <div class="row-actions">
                            <button class="btn-qty-interactive" onclick="adjustQty(${i.id}, -1)">-</button>
                            <span class="qty-number">${i.qty}</span>
                            <button class="btn-qty-interactive" onclick="adjustQty(${i.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('total-amount').innerText = `$${total.toFixed(2)}`;
        }

        function toggleDrawer(open) {
            const overlay = document.getElementById('drawer-overlay');
            if (open) {
                overlay.style.display = 'flex';
                setTimeout(() => overlay.classList.add('active'), 10);
            } else {
                overlay.classList.remove('active');
                setTimeout(() => overlay.style.display = 'none', 300);
            }
        }

        function submitToWhatsApp() {
            if(cart.length === 0) return;
            
            let msg = "🛹 *ARMÓNICA SHOP CAFE - COMANDA QR* 🛹\n";
            msg += "📍 *Ubicación:* Mesa 04\n";
            msg += "=========================\n";
            let total = 0;
            cart.forEach(i => {
                const sub = i.price * i.qty;
                total += sub;
                msg += `• *${i.qty}x* ${i.name} -> _$${sub.toFixed(2)}_\n`;
            });
            msg += "=========================\n";
            msg += `💰 *TOTAL A PAGAR:* $${total.toFixed(2)}\n\n`;
            msg += "📱 _Comanda autogestionada mediante el nuevo menú web dinámico._";

            window.open(`https://wa.me/50760000000?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = () => renderMenu(menuProducts);
    </script>
</body>
</html>
