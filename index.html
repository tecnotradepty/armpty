<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underground Menu - Interactivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-concrete: #161616;     /* Gris cemento oscuro */
            --surface-dark: #0d0d0d;    /* Negro mate barra */
            --border-grunge: #282828;   /* Bordes industriales */
            --neon-glow: #ffffff;       /* Blanco puro neón del logo */
            --neon-warm: #f39c12;       /* Toque de luz de filamento */
            --text-light: #f5f5f5;
            --text-dim: #888888;
            --whatsapp-green: #25d366;
            --font-urban: 'Impact', 'Arial Black', sans-serif;
            --font-clean: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-clean);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-concrete);
            color: var(--text-light);
            padding-bottom: 95px;
            /* Patrón geométrico sutil inspirado en el papel envoltorio del local */
            background-image: linear-gradient(30deg, #111 25%, transparent 25%), 
                              linear-gradient(30deg, transparent 75%, #111 75%), 
                              linear-gradient(30deg, #111 25%, transparent 25%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 5px, 10px 5px;
        }

        /* --- URBAN HEADER --- */
        .shop-header {
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(22,22,22,1) 100%);
            padding: 35px 20px 20px 20px;
            text-align: center;
            border-bottom: 3px solid #000;
            position: relative;
        }
        
        /* Logo conceptual inspirado en el letrero circular del bar */
        .logo-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid var(--neon-glow);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            margin: 0 auto 12px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
        }
        .logo-circle span {
            font-family: var(--font-urban);
            font-size: 38px;
            color: var(--neon-glow);
            line-height: 1;
            margin-top: -4px;
        }

        .shop-header h1 {
            font-family: var(--font-urban);
            font-size: 28px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-light);
        }
        .shop-header h1 span {
            color: var(--neon-warm);
        }
        .location-tag {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        /* --- CATEGORÍAS ESTILO SKATE/TAPAS --- */
        .categories-container {
            display: flex;
            gap: 8px;
            padding: 15px 15px;
            background-color: rgba(13, 13, 13, 0.95);
            position: sticky;
            top: 0;
            z-index: 10;
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border-grunge);
            backdrop-filter: blur(5px);
        }
        .categories-container::-webkit-scrollbar { display: none; }

        .category-tab {
            background: #1c1c1c;
            border: 1px solid #333;
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 0px; /* Estilo rústico/recto */
            font-family: var(--font-urban);
            font-size: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .category-tab.active {
            background-color: var(--text-light);
            color: #000;
            border-color: var(--text-light);
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        /* --- DISH GRID --- */
        .menu-grid {
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
            gap: 12px;
        }

        .menu-card {
            background-color: var(--surface-dark);
            border: 1px solid var(--border-grunge);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
        }
        .card-graphic {
            width: 100%;
            height: 105px;
            background: linear-gradient(135deg, #151515 0%, #222 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            border-bottom: 1px solid var(--border-grunge);
            position: relative;
        }
        .card-graphic::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--text-dim), transparent);
        }
        .card-details {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .card-details h3 {
            font-family: var(--font-urban);
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            color: var(--text-light);
        }
        .card-desc {
            font-size: 11px;
            color: var(--text-dim);
            line-height: 1.35;
            margin-bottom: 12px;
            flex-grow: 1;
        }
        .card-action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }
        .card-price {
            font-family: var(--font-urban);
            color: var(--neon-glow);
            font-size: 18px;
        }
        .btn-add-item {
            background-color: transparent;
            color: var(--text-light);
            border: 1px solid #444;
            width: 32px;
            height: 32px;
            border-radius: 0px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.15s ease;
        }
        .btn-add-item:active {
            background-color: var(--text-light);
            color: #000;
            border-color: var(--text-light);
        }

        /* --- FLOATING ORDER SYSTEM --- */
        .bottom-cart-bar {
            position: fixed;
            bottom: 20px; left: 15px; right: 15px;
            background-color: var(--text-light);
            color: #000;
            padding: 15px 20px;
            border-radius: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.8);
            z-index: 20;
        }
        .bottom-cart-bar .left-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .bottom-cart-bar .left-info i { font-size: 18px; }
        .bottom-cart-bar span {
            font-family: var(--font-urban);
            font-size: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .items-indicator {
            background-color: #000;
            color: var(--text-light);
            font-family: var(--font-urban);
            font-size: 13px;
            padding: 2px 8px;
            margin-left: 5px;
        }

        /* --- BLACKOUT DRAWER (CARRITO) --- */
        .drawer-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(3px);
            z-index: 30;
            display: none;
            align-items: flex-end;
        }
        .drawer-panel {
            background-color: var(--surface-dark);
            width: 100%;
            max-height: 80vh;
            border-top: 3px solid var(--border-grunge);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .drawer-title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-grunge);
            padding-bottom: 10px;
        }
        .drawer-title-bar h2 {
            font-family: var(--font-urban);
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-close-drawer {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 28px;
            cursor: pointer;
        }

        .drawer-list {
            overflow-y: auto;
            flex-grow: 1;
            margin-bottom: 15px;
        }
        .drawer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #161616;
        }
        .row-meta h4 {
            font-family: var(--font-urban);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .row-meta span {
            font-size: 12px;
            color: var(--neon-warm);
        }
        .row-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-qty {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            width: 26px;
            height: 26px;
            font-weight: bold;
            cursor: pointer;
        }

        .drawer-checkout-area { margin-top: auto; }
        .checkout-total-row {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-urban);
            font-size: 18px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .checkout-total-row .val { color: var(--neon-warm); }
        
        .btn-submit-order {
            width: 100%;
            background-color: var(--whatsapp-green);
            color: white;
            border: none;
            padding: 15px;
            font-family: var(--font-urban);
            font-size: 16px;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

            // TRICKS (PAPAS)[span_4](start_span)[span_4](end_span)

            // CERVEZAS[span_6](start_span)[span_6](end_span)

            // BEBIDAS NO ALCOHÓLICAS Y CAFÉ[span_7](start_span)[span_7](end_span)
            { id: 38, name: "Agua", category: "bebidas", price: 1.00, desc: "Botella de agua fría.", icon: "💧" },
            { id: 39, name: "Soda / Té Lipton", category: "bebidas", price: 1.80, desc: "Lata de soda variada o Té Lipton frío.", icon: "🥤" },
            { id: 40, name: "Licuados de Frutas", category: "bebidas", price: 2.00, desc: "Licuados naturales refrescantes.", icon: "🍓" },
            { id: 41, name: "Batidos de Frutas / Limonada", category: "bebidas", price: 2.50, desc: "Frutas naturales con agua o Limonada clásica.", icon: "🍋" },
            { id: 42, name: "Limonada con Hierba Buena", category: "bebidas", price: 3.50, desc: "Limonada con hierba buena fresca o infusión helada.", icon: "🌿" },
            { id: 43, name: "Café de la Barra (Caliente)", category: "bebidas", price: 2.50, desc: "Americano, Cappuccino, Latte o Vainilla.", icon: "☕" },
            { id: 44, name: "Café Especial / Chocolate", category: "bebidas", price: 3.00, desc: "Café con leche de almendra o Chocolate caliente.", icon: "☕" },
            { id: 45, name: "Moccachino", category: "bebidas", price: 3.50, desc: "Café espresso, leche y chocolate gourmet.", icon: "🍫" }
        ];

        let cart = [];

        function renderMenu(products) {
            const container = document.getElementById('menu-items-container');
            container.innerHTML = '';
            products.forEach(p => {
                container.innerHTML += `
                    <div class="menu-card">
                        <div class="card-graphic">${p.icon}</div>
                        <div class="card-details">
                            <h3>${p.name}</h3>
                            <p class="card-desc">${p.desc}</p>
                            <div class="card-action-bar">
                                <span class="card-price">$${p.price.toFixed(2)}</span>
                                <button class="btn-add-item" onclick="addToCart(${p.id})">+</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function filterCategory(cat) {
            document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if (cat === 'todos') {
                renderMenu(menuProducts);
            } else {
                renderMenu(menuProducts.filter(p => p.category === cat));
            }
        }

        function addToCart(id) {
            const product = menuProducts.find(p => p.id === id);
            const inCart = cart.find(item => item.id === id);
            if (inCart) { inCart.qty++; } else { cart.push({...product, qty: 1}); }
            updateUI();
        }

        function adjustQty(id, amount) {
            const item = cart.find(p => p.id === id);
            if (!item) return;
            item.qty += amount;
            if (item.qty <= 0) cart = cart.filter(p => p.id !== id);
            updateUI();
        }

        function updateUI() {
            const count = cart.reduce((acc, i) => acc + i.qty, 0);
            document.getElementById('cart-badge').innerText = count;

            const body = document.getElementById('drawer-items');
            body.innerHTML = '';
            let total = 0;

            cart.forEach(i => {
                const sub = i.price * i.qty;
                total += sub;
                body.innerHTML += `
                    <div class="drawer-row">
                        <div class="row-meta">
                            <h4>${i.name}</h4>
                            <span>$${sub.toFixed(2)} (${i.qty} x $${i.price.toFixed(2)})</span>
                        </div>
                        <div class="row-controls">
                            <button class="btn-qty" onclick="adjustQty(${i.id}, -1)">-</button>
                            <span>${i.qty}</span>
                            <button class="btn-qty" onclick="adjustQty(${i.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('total-amount').innerText = `$${total.toFixed(2)}`;
        }

        function toggleDrawer(open) {
            document.getElementById('drawer-overlay').style.display = open ? 'flex' : 'none';
        }

        function submitToWhatsApp() {
            if(cart.length === 0) return alert("Agrega items a tu comanda");
            
            let msg = "🛹 *ARMÓNICA PROYECT - PEDIDO DESDE LA MESA* 🛹\n";
            msg += "📍 *Ubicación:* Mesa 04\n";
            msg += "=========================\n";
            let total = 0;
            cart.forEach(i => {
                const sub = i.price * i.qty;
                total += sub;
                msg += `• *${i.qty}x* ${i.name} -> _$${sub.toFixed(2)}_\n`;
            });
            msg += "=========================\n";
            msg += `💰 *TOTAL A PAGAR:* $${total.toFixed(2)}\n\n`;
            msg += "📱 _Enviado desde el nuevo sistema de menú interactivo QR._";

            // Se deja número genérico para pruebas del programador
            window.open(`https://wa.me/50760000000?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = () => renderMenu(menuProducts);
    </script>
</body>
</html>
