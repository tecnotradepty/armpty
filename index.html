<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armónica Shop Cafe - Menú Interactivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-concrete: #121212;     /* Gris asfalto texturizado */
            --surface-dark: #070707;    /* Negro tinta industrial */
            --border-grunge: #262626;   /* Bordes de acero / metal */
            --neon-white: #ffffff;      
            --skate-yellow: #ffcc00;    /* Amarillo señal de tránsito / Grafiti */
            --text-light: #f5f5f5;
            --text-dim: #666666;
            --whatsapp-green: #25d366;
            --font-urban: 'Anton', sans-serif;
            --font-clean: 'Space Grotesk', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-clean);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-concrete);
            color: var(--text-light);
            padding-bottom: 120px;
            overflow-x: hidden;
            
            /* Patrón geométrico de alta densidad inspirado en su envoltorio */
            background-image: 
                linear-gradient(45deg, #090909 25%, transparent 25%, transparent 75%, #090909 75%, #090909),
                linear-gradient(45deg, #090909 25%, transparent 25%, transparent 75%, #090909 75%, #090909);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
        }

        /* --- URBAN HEADER --- */
        .shop-header {
            background: linear-gradient(180deg, #000000 0%, rgba(18,18,18,0.9) 100%);
            padding: 50px 20px 30px 20px;
            text-align: center;
            border-bottom: 4px solid var(--skate-yellow);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        
        /* Línea gráfica de advertencia callejera */
        .shop-header::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 4px;
            background: repeating-linear-gradient(-45deg, #000, #000 10px, var(--skate-yellow) 10px, var(--skate-yellow) 20px);
        }

        .logo-graphic-node {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 4px solid var(--neon-white);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.4), inset 0 0 15px rgba(255,255,255,0.3);
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            background-image: radial-gradient(circle, #1a1a1a 0%, #000 80%);
        }
        .logo-graphic-node span {
            font-family: var(--font-urban);
            font-size: 52px;
            color: var(--neon-white);
            line-height: 1;
            margin-top: -6px;
            letter-spacing: -2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .shop-header h1 {
            font-family: var(--font-urban);
            font-size: 38px;
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 0.9;
            color: var(--text-light);
            -webkit-text-stroke: 1px rgba(255,255,255,0.1);
        }
        .shop-header h1 span {
            color: var(--skate-yellow);
            display: block;
            font-size: 42px;
            text-shadow: 2px 2px 0px #000;
        }
        .graphic-tag {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #000;
            background-color: var(--text-light);
            padding: 4px 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 15px;
            transform: rotate(-1.5deg);
            box-shadow: 3px 3px 0px var(--skate-yellow);
        }

        /* --- HERO PROMO BANNERS (CARRUSEL SLIDER) --- */
        .promo-slider-container {
            padding: 20px 15px 10px 15px;
            overflow-x: auto;
            display: flex;
            gap: 12px;
            scrollbar-width: none;
        }
        .promo-slider-container::-webkit-scrollbar { display: none; }
        
        .promo-banner {
            min-width: 280px;
            height: 140px;
            border: 2px solid var(--border-grunge);
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 15px;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.5);
        }
        .promo-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 100%);
            z-index: 1;
        }
        .promo-text {
            z-index: 2;
            position: relative;
        }
        .promo-text h2 {
            font-family: var(--font-urban);
            font-size: 20px;
            text-transform: uppercase;
            color: var(--skate-yellow);
            line-height: 1;
            margin-bottom: 2px;
        }
        .promo-text p {
            font-size: 11px;
            color: var(--text-light);
            font-weight: bold;
        }

        /* --- CATEGORÍAS --- */
        .categories-slider {
            display: flex;
            gap: 8px;
            padding: 15px;
            background: rgba(5, 5, 5, 0.9);
            position: sticky;
            top: 0;
            z-index: 10;
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border-grunge);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .categories-slider::-webkit-scrollbar { display: none; }

        .category-tab {
            background: transparent;
            border: 2px solid var(--border-grunge);
            color: var(--text-dim);
            padding: 10px 22px;
            font-family: var(--font-urban);
            font-size: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .category-tab.active {
            background-color: var(--skate-yellow);
            color: #000;
            border-color: var(--skate-yellow);
            box-shadow: 4px 4px 0px var(--text-light);
            transform: translateY(-2px);
        }

        /* --- MENU GRID --- */
        .menu-grid {
            padding: 20px 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 16px;
        }

        .menu-card {
            background: var(--surface-dark);
            border: 2px solid var(--border-grunge);
            position: relative;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(20px);
            animation: cardReveal 0.4s forwards ease;
        }
        
        @keyframes cardReveal {
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-card:active {
            transform: scale(0.96) rotate(-1deg);
            border-color: var(--skate-yellow);
        }

        .card-graphic-frame {
            width: 100%;
            height: 120px;
            background: radial-gradient(circle, #1c1c1c 0%, #080808 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            border-bottom: 2px solid var(--border-grunge);
            position: relative;
            overflow: hidden;
        }
        
        .card-graphic-frame::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 10px 10px;
        }

        .card-graphic-frame span {
            z-index: 2;
            filter: drop-shadow(0px 0px 12px rgba(255, 204, 0, 0.4));
        }

        .card-body {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            background: linear-gradient(180deg, var(--surface-dark) 0%, #000000 100%);
        }
        .card-body h3 {
            font-family: var(--font-urban);
            font-size: 19px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-light);
            line-height: 1;
            margin-bottom: 6px;
        }
        .card-desc {
            font-size: 11px;
            color: #777;
            line-height: 1.4;
            margin-bottom: 15px;
            flex-grow: 1;
        }
        .card-footer-layout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }
        .card-price {
            font-family: var(--font-urban);
            color: var(--skate-yellow);
            font-size: 22px;
            text-shadow: 1px 1px 0px #000;
        }
        
        .btn-add-graphic {
            background-color: transparent;
            color: var(--text-light);
            border: 2px solid var(--text-light);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .btn-add-graphic:active {
            background-color: var(--skate-yellow);
            color: #000;
            border-color: var(--skate-yellow);
            transform: scale(1.1);
        }

        /* --- COMMUNITY SECTION (INSTAGRAM & AMBIENTE) --- */
        .instagram-section {
            padding: 30px 15px;
            background: #000;
            border-top: 2px solid var(--border-grunge);
            text-align: center;
        }
        .instagram-section h2 {
            font-family: var(--font-urban);
            font-size: 24px;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        .btn-instagram-sticker {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: var(--skate-yellow);
            color: #000;
            text-decoration: none;
            padding: 12px 24px;
            font-family: var(--font-urban);
            font-size: 18px;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px var(--text-light);
            margin-bottom: 25px;
            transition: all 0.2s ease;
        }
        .btn-instagram-sticker:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--text-light);
        }
        
        .ambient-mosaic {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .ambient-photo {
            width: 100%;
            height: 130px;
            border: 1px solid var(--border-grunge);
            background-size: cover;
            background-position: center;
            /* Filtros de imagen estilo catálogo rústico/grunge */
            filter: grayscale(20%) contrast(110%);
            transition: all 0.3s ease;
        }
        .ambient-photo:active {
            filter: grayscale(0%) contrast(100%);
            transform: scale(0.98);
        }

        /* --- FLOATING ORDER CONSOLE --- */
        .bottom-order-console {
            position: fixed;
            bottom: 25px; left: 15px; right: 15px;
            background-color: var(--skate-yellow);
            color: #000;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
            z-index: 20;
            transform: translateY(150%);
            transition: transform 0.35s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .bottom-order-console.visible { transform: translateY(0); }
        .bottom-order-console.active-pulse { animation: consoleGlow 1.5s infinite alternate; }
        @keyframes consoleGlow {
            0% { box-shadow: 0 15px 40px rgba(0,0,0,0.9); }
            100% { box-shadow: 0 0 25px rgba(255, 204, 0, 0.7); }
        }
        .bottom-order-console span {
            font-family: var(--font-urban);
            font-size: 18px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .graphic-badge {
            background-color: #000;
            color: #fff;
            font-family: var(--font-urban);
            font-size: 15px;
            padding: 2px 10px;
            box-shadow: 2px 2px 0px #fff;
        }

        /* --- DRAWER PANEL DE COMANDA --- */
        .drawer-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            z-index: 30;
            display: none;
            align-items: flex-end;
        }
        .drawer-surface {
            background-color: var(--surface-dark);
            width: 100%;
            max-height: 85vh;
            border-top: 4px solid var(--skate-yellow);
            display: flex;
            flex-direction: column;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
        }
        .drawer-overlay.active .drawer-surface { transform: translateY(0); }
        
        .drawer-title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-grunge);
            padding-bottom: 12px;
        }
        .drawer-title-bar h2 {
            font-family: var(--font-urban);
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-close-console { background: none; border: none; color: #444; font-size: 36px; cursor: pointer; }

        .drawer-list { overflow-y: auto; flex-grow: 1; }
        .drawer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #111;
        }
        .row-meta h4 { font-family: var(--font-urban); font-size: 16px; text-transform: uppercase; }
        .row-meta span { font-size: 13px; color: var(--skate-yellow); font-weight: 700; }
        .row-controls { display: flex; align-items: center; gap: 12px; }
        .btn-qty-action { background: #111; border: 1px solid var(--border-grunge); color: #fff; width: 32px; height: 32px; font-weight: bold; }
        .btn-qty-action:active { background-color: var(--skate-yellow); color: #000; }
        .qty-label { font-family: var(--font-urban); font-size: 18px; min-width: 20px; text-align: center; }

        .checkout-area { margin-top: auto; padding-top: 20px; }
        .total-row {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-urban);
            font-size: 22px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .total-row .val { color: var(--skate-yellow); font-size: 26px; }
        
        .btn-whatsapp-fire {
            width: 100%;
            background-color: var(--whatsapp-green);
            color: white;
            border: none;
            padding: 18px;
            font-family: var(--font-urban);
            font-size: 20px;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>

        let cart = [];

        function renderMenu(products) {
            const container = document.getElementById('menu-items-container');
            container.innerHTML = '';
            products.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.style.animationDelay = `${index * 0.02}s`;
                card.innerHTML = `
                    <div class="card-graphic-frame"><span>${p.icon}</span></div>
                    <div class="card-body">
                        <h3>${p.name}</h3>
                        <p class="card-desc">${p.desc}</p>
                        <div class="card-footer-layout">
                            <span class="card-price">$${p.price.toFixed(2)}</span>
                            <button class="btn-add-graphic" onclick="addToCart(${p.id})">+</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterCategory(cat) {
            document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const container = document.getElementById('menu-items-container');
            container.style.opacity = 0;
            setTimeout(() => {
                if (cat === 'todos') { renderMenu(menuProducts); } 
                else { renderMenu(menuProducts.filter(p => p.category === cat)); }
                container.style.opacity = 1;
            }, 100);
        }

        function addToCart(id) {
            const product = menuProducts.find(p => p.id === id);
            const inCart = cart.find(item => item.id === id);
            if (inCart) { inCart.qty++; } else { cart.push({...product, qty: 1}); }
            updateUI();
        }

        function adjustQty(id, amount) {
            const item = cart.find(p => p.id === id);
            if (!item) return;
            item.qty += amount;
            if (item.qty <= 0) cart = cart.filter(p => p.id !== id);
            updateUI();
        }

        function updateUI() {
            const count = cart.reduce((acc, i) => acc + i.qty, 0);
            const orderBar = document.getElementById('order-bar');
            if (count > 0) { orderBar.classList.add('visible', 'active-pulse'); } 
            else { orderBar.classList.remove('visible', 'active-pulse'); toggleDrawer(false); }
            
            document.getElementById('cart-badge').innerText = count;
            const body = document.getElementById('drawer-items');
            body.innerHTML = '';
            let total = 0;

            cart.forEach(i => {
                const sub = i.price * i.qty;
                total += sub;
                body.innerHTML += `
                    <div class="drawer-row">
                        <div class="row-meta">
                            <h4>${i.name}</h4>
                            <span>$${sub.toFixed(2)} (${i.qty} x $${i.price.toFixed(2)})</span>
                        </div>
                        <div class="row-controls">
                            <button class="btn-qty-action" onclick="adjustQty(${i.id}, -1)">-</button>
                            <span class="qty-label">${i.qty}</span>
                            <button class="btn-qty-action" onclick="adjustQty(${i.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('total-amount').innerText = `$${total.toFixed(2)}`;
        }

        function toggleDrawer(open) {
            const overlay = document.getElementById('drawer-overlay');
            if (open) {
                overlay.style.display = 'flex';
                setTimeout(() => overlay.classList.add('active'), 10);
            } else {
                overlay.classList.remove('active');
                setTimeout(() => overlay.style.display = 'none', 250);
            }
        }

        function submitToWhatsApp() {
            if(cart.length === 0) return;
            let msg = " Skid & Feed - COMANDA ARMONICA 🛹\n";
            msg += "📍 Ubicación: Mesa 04\n";
            msg += "=========================\n";
            let total = 0;
            cart.forEach(i => {
                const sub = i.price * i.qty;
                total += sub;
                msg += `• ${i.qty}x ${i.name} -> $${sub.toFixed(2)}\n`;
            });
            msg += "=========================\n";
            msg += ` Total Cuenta: $${total.toFixed(2)}\n\n`;
            msg += "Enviado mediante menú interactivo digital QR.";
            window.open(`https://wa.me/50760000000?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = () => renderMenu(menuProducts);
    </script>
