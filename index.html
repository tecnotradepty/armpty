<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armónica Proyect - Anti-Grid Experience</title>
    <!-- Iconos y Fuentes Brutalistas -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-asphalt: #0d0d0d;      /* Negro asfalto puro */
            --concrete-grey: #181818;   /* Cemento profundo */
            --grunge-border: #2a2a2a;   /* Bordes de acero rústico */
            --neon-strobe: #ffffff;     /* Brillo blanco del logo */
            --skate-fire: #ffcc00;      /* Amarillo señal / Grafiti */
            --text-raw: #f5f5f5;
            --text-dark: #000000;
            --muted-iron: #555555;
            --whatsapp-glitch: #25d366;
            --font-heavy: 'Anton', sans-serif;
            --font-street: 'Space Grotesk', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-street);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-asphalt);
            color: var(--text-raw);
            padding-bottom: 130px;
            overflow-x: hidden;
            
            /* DISEÑO GRÁFICO: Fondo texturizado complejo de alta costura callejera */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 204, 0, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.02) 0%, transparent 40%),
                linear-gradient(45deg, #050505 25%, transparent 25%, transparent 75%, #050505 75%, #050505),
                linear-gradient(45deg, #050505 25%, transparent 25%, transparent 75%, #050505 75%, #050505);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            background-position: 0 0, 0 0, 0 0, 20px 20px;
        }

        /* --- VANDAL HEADER --- */
        .vandal-header {
            background: #000000;
            padding: 60px 20px 40px 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        
        /* Efecto de fondo rasgado / textura de cinta en el header */
        .vandal-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 8px;
            background: repeating-linear-gradient(-45deg, var(--text-dark), var(--text-dark) 12px, var(--skate-fire) 12px, var(--skate-fire) 24px);
        }

        .halo-logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid var(--neon-strobe);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3), inset 0 0 20px rgba(255,255,255,0.2);
            margin: 0 auto 25px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            transform: rotate(-3deg);
            transition: transform 0.3s ease;
        }
        .halo-logo:active { transform: scale(1.1) rotate(5deg); }
        .halo-logo span {
            font-family: var(--font-heavy);
            font-size: 58px;
            color: var(--neon-strobe);
            line-height: 1;
            margin-top: -8px;
        }

        /* Títulos masivos con textura interna */
        .vandal-header h1 {
            font-family: var(--font-heavy);
            font-size: 46px;
            letter-spacing: -1px;
            text-transform: uppercase;
            line-height: 0.85;
            color: var(--text-raw);
        }
        .vandal-header h1 span {
            color: var(--skate-fire);
            font-size: 52px;
            display: block;
            text-shadow: 3px 3px 0px #000;
        }

        .sticker-badge {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-dark);
            background-color: var(--text-raw);
            padding: 5px 16px;
            font-weight: 700;
            display: inline-flex;
            margin-top: 20px;
            transform: rotate(2.5deg);
            box-shadow: 4px 4px 0px var(--skate-fire);
        }

        /* --- FLYERS ASIMÉTRICOS (PROMOS) --- */
        .flyer-magazine-rack {
            padding: 25px 15px 15px 15px;
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .flyer-magazine-rack::-webkit-scrollbar { display: none; }
        
        .grunge-flyer {
            min-width: 290px;
            height: 160px;
            background-size: cover;
            background-position: center;
            position: relative;
            border: 2px solid var(--text-raw);
            box-shadow: 8px 8px 0px #000;
            display: flex;
            align-items: flex-end;
            padding: 20px;
            transition: all 0.25s ease;
        }
        /* Rotación alterna para dar el look "tirado en una mesa" */
        .grunge-flyer:nth-child(odd) { transform: rotate(-1.5deg); }
        .grunge-flyer:nth-child(even) { transform: rotate(1.5deg); }
        .grunge-flyer:active { transform: scale(0.98) rotate(0deg); }

        .flyer-tint {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 100%);
        }
        .flyer-data { z-index: 2; position: relative; }
        .flyer-data h2 {
            font-family: var(--font-heavy);
            font-size: 24px;
            color: var(--skate-fire);
            line-height: 1;
            text-shadow: 2px 2px 0px #000;
        }
        .flyer-data p { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }

        /* --- CATEGORÍAS TIPO STENCIL --- */
        .stencil-categories {
            display: flex;
            gap: 10px;
            padding: 20px 15px;
            background: rgba(0, 0, 0, 0.85);
            position: sticky;
            top: 0;
            z-index: 10;
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 2px solid var(--grunge-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .stencil-categories::-webkit-scrollbar { display: none; }

        .stencil-tab {
            background: #111;
            border: 2px solid var(--grunge-border);
            color: var(--muted-iron);
            padding: 12px 24px;
            font-family: var(--font-heavy);
            font-size: 18px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .stencil-tab.active {
            background-color: var(--skate-fire);
            color: var(--text-dark);
            border-color: var(--skate-fire);
            box-shadow: 5px 5px 0px var(--text-raw);
            transform: translateY(-3px) rotate(-1deg);
        }

        /* --- ANTI-GRID COLLAGE (MENU) --- */
        .collage-container {
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            gap: 24px; /* Layout vertical asimétrico tipo fanzine */
        }

        .collage-card {
            background: var(--concrete-grey);
            border: 2px solid var(--grunge-border);
            display: flex;
            height: 130px;
            position: relative;
            opacity: 0;
            transform: scale(0.95);
            animation: fanzineReveal 0.35s forwards cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }
        @keyframes fanzineReveal { to { opacity: 1; transform: scale(1); } }

        /* Alternamos la dirección del contenido y la inclinación de forma asimétrica */
        .collage-card:nth-child(even) {
            flex-direction: row-reverse;
            transform: rotate(1deg);
            border-left: 4px solid var(--skate-fire);
        }
        .collage-card:nth-child(odd) {
            transform: rotate(-1deg);
            border-right: 4px solid var(--neon-white);
        }
        .collage-card:active {
            border-color: var(--skate-fire) !important;
            transform: scale(0.98) rotate(0deg) !important;
        }

        /* Contenedor del icono/gráfico de la tarjeta */
        .collage-visual {
            width: 35%;
            background: radial-gradient(circle, #222 0%, #050505 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 46px;
            position: relative;
            overflow: hidden;
        }
        .collage-visual::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 8px 8px;
        }

        .collage-details {
            width: 65%;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: #090909;
        }
        .collage-details h3 {
            font-family: var(--font-heavy);
            font-size: 20px;
            text-transform: uppercase;
            color: var(--text-raw);
            line-height: 1;
        }
        .collage-desc {
            font-size: 11px;
            color: #666;
            line-height: 1.3;
            margin: 4px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .collage-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .collage-price {
            font-family: var(--font-heavy);
            color: var(--skate-fire);
            font-size: 24px;
        }
        
        .btn-add-tag {
            background: transparent;
            color: var(--text-raw);
            border: 2px solid var(--text-raw);
            padding: 2px 14px;
            font-family: var(--font-heavy);
            font-size: 15px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-add-tag:active {
            background-color: var(--skate-fire);
            color: var(--text-dark);
            border-color: var(--skate-fire);
        }

        /* --- CLAN COMMUNITY SECT (INSTAGRAM) --- */
        .clan-mural {
            padding: 40px 15px;
            background: #000000;
            border-top: 3px solid var(--grunge-border);
            text-align: center;
            position: relative;
        }
        .clan-mural h2 {
            font-family: var(--font-heavy);
            font-size: 32px;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }
        .sticker-link-ig {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background-color: var(--neon-white);
            color: var(--text-dark);
            text-decoration: none;
            padding: 14px 28px;
            font-family: var(--font-heavy);
            font-size: 20px;
            text-transform: uppercase;
            box-shadow: 6px 6px 0px var(--skate-fire);
            margin-bottom: 30px;
            transform: rotate(-1deg);
        }
        
        /* Mosaico de fotos reales con filtros rústicos intensos */
        .grid-mosaic-grunge {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .sticker-photo {
            width: 100%;
            height: 140px;
            border: 2px solid var(--grunge-border);
            background-size: cover;
            background-position: center;
            filter: grayscale(40%) contrast(120%) brightness(90%);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .sticker-photo:nth-child(1) { transform: rotate(-2deg); border-color: var(--skate-fire); }
        .sticker-photo:nth-child(2) { transform: rotate(2deg); border-color: var(--neon-white); }
        .sticker-photo:active {
            filter: grayscale(0%) contrast(100%) brightness(100%);
            transform: scale(1.03) rotate(0deg);
            z-index: 5;
        }

        /* --- FLOATING COMMAND DESK --- */
        .floating-desk-bar {
            position: fixed;
            bottom: 25px; left: 15px; right: 15px;
            background-color: var(--skate-fire);
            color: var(--text-dark);
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 20px 45px rgba(0,0,0,0.9);
            z-index: 20;
            transform: translateY(160%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.3);
        }
        .floating-desk-bar.visible { transform: translateY(0); }
        .floating-desk-bar.pulse-glow { animation: rawGlow 1.8s infinite alternate; }
        @keyframes rawGlow {
            0% { box-shadow: 0 20px 45px rgba(0,0,0,0.9); }
            100% { box-shadow: 0 0 30px rgba(255, 204, 0, 0.8); }
        }
        .floating-desk-bar span {
            font-family: var(--font-heavy);
            font-size: 20px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .raw-badge {
            background-color: var(--text-dark);
            color: var(--text-raw);
            font-family: var(--font-heavy);
            font-size: 16px;
            padding: 2px 12px;
            box-shadow: 3px 3px 0px var(--text-raw);
        }

        /* --- OVERLAY CONSOLE (CARRITO) --- */
        .console-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.96);
            z-index: 30;
            display: none;
            align-items: flex-end;
        }
        .console-panel {
            background-color: #050505;
            width: 100%;
            max-height: 85vh;
            border-top: 4px solid var(--skate-fire);
            display: flex;
            flex-direction: column;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        .console-overlay.active .console-panel { transform: translateY(0); }
        
        .console-title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--grunge-border);
            padding-bottom: 12px;
        }
        .console-title-bar h2 {
            font-family: var(--font-heavy);
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-abort-console { background: none; border: none; color: #444; font-size: 38px; cursor: pointer; }

        .console-rows { overflow-y: auto; flex-grow: 1; }
        .console-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #111;
        }
        .row-data h4 { font-family: var(--font-heavy); font-size: 18px; text-transform: uppercase; }
        .row-data span { font-size: 13px; color: var(--skate-fire); font-weight: 700; }
        .row-triggers { display: flex; align-items: center; gap: 14px; }
        .btn-qty-trigger { background: #111; border: 1px solid var(--grunge-border); color: #fff; width: 34px; height: 34px; font-weight: bold; cursor: pointer; }
        .btn-qty-trigger:active { background-color: var(--skate-fire); color: #000; }
        .qty-val { font-family: var(--font-heavy); font-size: 20px; min-width: 20px; text-align: center; }

        .console-footer { margin-top: auto; padding-top: 20px; }
        .total-bill-row {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-heavy);
            font-size: 24px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }
        .total-bill-row .val { color: var(--skate-fire); font-size: 30px; text-shadow: 2px 2px 0px #000; }
        
        .btn-push-kitchen {
            width: 100%;
            background-color: var(--whatsapp-glitch);
            color: white;
            border: none;
            padding: 20px;
            font-family: var(--font-heavy);
            font-size: 22px;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 25px rgba(37, 211, 102, 0.4);
        }
    </style>
</head>

        let cart = [];

        function renderMenu(products) {
            const container = document.getElementById('menu-items-container');
            container.innerHTML = '';
            products.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = 'collage-card';
                card.style.animationDelay = `${index * 0.02}s`;
                card.innerHTML = `
                    <div class="collage-visual"><span>${p.icon}</span></div>
                    <div class="collage-details">
                        <div>
                            <h3>${p.name}</h3>
                            <p class="collage-desc">${p.desc}</p>
                        </div>
                        <div class="collage-actions">
                            <span class="collage-price">$${p.price.toFixed(2)}</span>
                            <button class="btn-add-tag" onclick="addToCart(${p.id})">ADD +</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterCategory(cat) {
            document.querySelectorAll('.stencil-tab').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const container = document.getElementById('menu-items-container');
            container.style.opacity = 0;
            setTimeout(() => {
                if (cat === 'todos') { renderMenu(menuProducts); } 
                else { renderMenu(menuProducts.filter(p => p.category === cat)); }
                container.style.opacity = 1;
            }, 120);
        }

        function addToCart(id) {
            const product = menuProducts.find(p => p.id === id);
            const inCart = cart.find(item => item.id === id);
            if (inCart) { inCart.qty++; } else { cart.push({...product, qty: 1}); }
            updateUI();
        }

        function adjustQty(id, amount) {
            const item = cart.find(p => p.id === id);
            if (!item) return;
            item.qty += amount;
            if (item.qty <= 0) cart = cart.filter(p => p.id !== id);
            updateUI();
        }

        function updateUI() {
            const count = cart.reduce((acc, i) => acc + i.qty, 0);
            const orderBar = document.getElementById('order-bar');
            if (count > 0) { orderBar.classList.add('visible', 'pulse-glow'); } 
            else { orderBar.classList.remove('visible', 'pulse-glow'); toggleConsole(false); }
            
            document.getElementById('cart-badge').innerText = count;
            const body = document.getElementById('drawer-items');
            body.innerHTML = '';
            let total = 0;

            cart.forEach(i => {
                const sub = i.price * i.qty;
                total += sub;
                body.innerHTML += `
                    <div class="console-row">
                        <div class="row-data">
                            <h4>${i.name}</h4>
                            <span>$${sub.toFixed(2)} (${i.qty} x $${i.price.toFixed(2)})</span>
                        </div>
                        <div class="row-triggers">
                            <button class="btn-qty-trigger" onclick="adjustQty(${i.id}, -1)">-</button>
                            <span class="qty-val">${i.qty}</span>
                            <button class="btn-qty-trigger" onclick="adjustQty(${i.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('total-amount').innerText = `$${total.toFixed(2)}`;
        }

        function toggleConsole(open) {
            const overlay = document.getElementById('console-overlay');
            if (open) {
                overlay.style.display = 'flex';
                setTimeout(() => overlay.classList.add('active'), 10);
            } else {
                overlay.classList.remove('active');
                setTimeout(() => overlay.style.display = 'none', 250);
            }
        }

        function submitToWhatsApp() {
            if(cart.length === 0) return;
            let msg = "🛹 *ARMÓNICA SHOP CAFE - COMANDA RAW* 🛹\n";
            msg += "📍 *Ubicación:* Mesa 04\n";
            msg += "=========================\n";
            let total = 0;
            cart.forEach(i => {
                const sub = i.price * i.qty;
                total += sub;
                msg += `• *${i.qty}x* ${i.name} -> _$${sub.toFixed(2)}_\n`;
            });
            msg += "=========================\n";
            msg += `💰 *TOTAL CUENTA:* $${total.toFixed(2)}\n\n`;
            msg += "📱 _Comanda procesada vía menú anti-grid interactivo._";
            window.open(`https://wa.me/50760000000?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = () => renderMenu(menuProducts);
    </script>
